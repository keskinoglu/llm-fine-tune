[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "llm-fine-tune"
version = "0.2.0"
description = "Tools to build the leetcode-solutions HuggingFace dataset"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "polars>=1.0.0",
    "huggingface-hub>=0.32.0",
]

[project.scripts]
build-dataset = "llm_fine_tune.build_dataset:main"
publish-dataset = "llm_fine_tune.upload_dataset:main"

[tool.hatch.build.targets.wheel]
packages = ["src/llm_fine_tune"]

[tool.commitizen]
version_provider = "pep621"
update_changelog_on_bump = true

[dependency-groups]
dev = [
    "ruff>=0.1.0",
    "commitizen>=3.0.0",
    "ipykernel>=7.2.0",
    "pandas>=3.0.3",
    "pyarrow>=24.0.0",
]
