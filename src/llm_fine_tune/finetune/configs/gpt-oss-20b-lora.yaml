# =============================================================================
# ADVANCED / NVIDIA-HOPPER-ONLY
#
# LLaMA-Factory unconditionally forces FlashAttention-3 for gpt_oss (hardcoded
# in configure_attn_implementation). FA3 requires NVIDIA Hopper (H100/H200) —
# it will NOT run on AMD GPUs or pre-Hopper NVIDIA (A100, V100, etc.).
# The `flash_attn` setting below is ignored for this model type.
#
# Use configs/llama-3.2-1b-lora.yaml for a config that runs on any hardware.
# =============================================================================

### model
model_name_or_path: openai/gpt-oss-20b
# harmony chat format — model-specific, do not change
template: gpt_oss

### method
stage: sft
do_train: true
finetuning_type: lora
lora_target: all

### dataset
# resolved via --dataset_dir injected by the SLURM script at runtime
# train on held-out split; to train on all data use:
# dataset: leetcode_instruct_train,leetcode_instruct_test
dataset: leetcode_instruct_train
eval_dataset: leetcode_instruct_test
cutoff_len: 2048
preprocessing_num_workers: 8

### precision
# Use bf16, not fp16. The AMD MI210 supports bf16 natively, and gpt-oss
# training is numerically unstable in fp16. Do NOT change this on this hardware.
bf16: true

### training hyperparameters
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 1.0e-4
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_steps: 10
logging_steps: 10
save_steps: 200
plot_loss: true

### multi-GPU coordination
# ddp_timeout is set very high so the rank that finishes loading the dataset
# first does not trip the NCCL/gloo barrier timeout while other ranks are still
# downloading and preprocessing. The default (30 min) is too short for large models.
ddp_timeout: 180000000

### output
# output_dir is NOT set here — it is injected by submit-finetune.sh at runtime
# so each config gets its own named directory under $WORK_DIR/saves/.
