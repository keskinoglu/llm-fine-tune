### model
model_name_or_path: Qwen/Qwen3.5-0.8B
template: qwen3_5_nothink
# adapter_name_or_path injected at runtime by the cluster job script

### method
finetuning_type: lora

### export
# export_dir injected at runtime by the cluster job script
export_size: 5              # shard size in GB; a 0.8B model fits well within one shard
export_device: cpu          # merge arithmetic on CPU — exact, no risk of GPU OOM
export_legacy_format: false
# export_hub_model_id is intentionally absent — publishing is handled by publish-model
