### model
# Gemma 3 (this file) respects flash_attn: sdpa.
# Gemma 2 silently forces FA2 regardless of this setting — do not use this config for Gemma 2.
# LLaMA-Factory's gemma3 template requires a multimodal image processor. Only the 4B+ models
# ship with one; the 1B (gemma3_text) is text-only and will crash with "Processor was not found".
# Requires accepting the Gemma license on huggingface.co/google/gemma-3-4b-it before your token works.
model_name_or_path: google/gemma-3-4b-it
template: gemma3
flash_attn: sdpa

### method
stage: sft
do_train: true
finetuning_type: lora
lora_target: all

### dataset
# resolved via dataset_dir injected by the cluster job script at runtime
# train on held-out split; to train on all data use:
# dataset: leetcode_instruct_train,leetcode_instruct_test
dataset: leetcode_instruct_train
eval_dataset: leetcode_instruct_test
cutoff_len: 2048
preprocessing_num_workers: 8

### precision
# bf16 works on AMD MI210 and NVIDIA Ampere+ (compute capability >= 8.0, e.g. A100/H100).
# For older NVIDIA GPUs (e.g. V100, sm_70): set bf16: false and fp16: true.
bf16: true

### training hyperparameters
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 1.0e-4
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_steps: 10
logging_steps: 10
save_steps: 200
plot_loss: true

### multi-GPU coordination
ddp_timeout: 180000000

### output
# output_dir is NOT set here — injected by the cluster job script at runtime.
